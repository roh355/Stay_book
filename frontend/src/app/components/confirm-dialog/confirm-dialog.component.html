@if (confirm.state(); as s) {
  <div class="overlay" (click)="confirm.cancel()">
    <div class="dialog card" (click)="$event.stopPropagation()" role="alertdialog" aria-modal="true">
      <div class="dialog-head">
        <div class="warn-icon" [class.danger]="s.danger">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
            <path d="M12 9v4M12 17h.01" />
          </svg>
        </div>
        <h2>{{ s.title }}</h2>
        <p>{{ s.message }}</p>
      </div>

      <div class="dialog-actions">
        <button class="btn btn-ghost" type="button" (click)="confirm.cancel()">
          {{ s.cancelText || 'Cancel' }}
        </button>
        <button
          class="btn"
          [class.btn-danger]="s.danger"
          [class.btn-primary]="!s.danger"
          type="button"
          (click)="confirm.confirm()"
        >
          {{ s.confirmText || 'Confirm' }}
        </button>
      </div>
    </div>
  </div>
}
