<header class="appbar">
  <div class="appbar-inner">
    <a class="brand" routerLink="/conference">
      <span class="brand-mark">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 21h18" />
          <path d="M5 21V7l8-4v18" />
          <path d="M19 21V11l-6-4" />
          <path d="M9 9v.01M9 12v.01M9 15v.01M9 18v.01" />
        </svg>
      </span>
      <span class="brand-name">StayBook</span>
    </a>

    <nav class="tabs">
      <a routerLink="/conference" routerLinkActive="active" class="tab">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="16" rx="2" />
          <path d="M8 2v4M16 2v4M3 10h18" />
        </svg>
        Conference
      </a>
      <a routerLink="/hostel" routerLinkActive="active" class="tab">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 7v13M3 12h13a4 4 0 0 1 4 4v4M3 9h7a3 3 0 0 1 3 3" />
        </svg>
        Hostel
      </a>
    </nav>

    <div class="actions">
      <button class="icon-btn theme-toggle" type="button" (click)="toggleTheme()" [attr.aria-label]="theme.theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'">
        @if (theme.theme() === 'dark') {
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="4" />
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41" />
          </svg>
        } @else {
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
        }
      </button>

      @if (auth.isAdmin()) {
        <button class="btn btn-ghost" type="button" (click)="logout()">Logout</button>
      } @else {
        <button class="btn btn-primary" type="button" (click)="openLogin()">Sign in</button>
      }

      <a class="icon-btn profile-btn" routerLink="/profile" routerLinkActive="active" aria-label="Profile">
        @if (auth.isAdmin()) {
          <span class="avatar">{{ (auth.user()?.username || '?')[0].toUpperCase() }}</span>
        } @else {
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="8" r="4" />
            <path d="M4 21v-1a7 7 0 0 1 14 0v1" />
          </svg>
        }
      </a>
    </div>
  </div>
</header>

<main class="content">
  <router-outlet />
</main>

@if (ui.loginModalOpen()) {
  <app-login-modal />
}
